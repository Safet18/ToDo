<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ToDo App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <h1>ToDo</h1>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>Welcome</h2>
        <p>Welcome to the application. Manage your tasks and workflow efficiently.</p>

        <div class="support">
            <h3>Support</h3>
            <p>Need help? Contact us anytime.</p>
        </div>

        <div class="extra">
            <p>Status: Online</p>
        </div>
    </div>

    <!-- LOGIN -->
    <div class="login-box">
        <h2>Sign In</h2>

        <input type="text" placeholder="Login">
        <input type="password" placeholder="Password">

        <button>Login</button>

        <div class="bottom">
            <button class="forgot">Forgot password?</button>
        </div>
    </div>

</div>

<!-- FOOTER -->
<div class="footer">
    © 2026 ToDo Application. All rights reserved.
</div>

</body>
</html>
